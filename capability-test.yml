tests:
  - id: generates-story-and-page-image-through-local-dependencies
    kind: http
    target:
      workload: storybook
      endpoint: /test
    request:
      method: POST
      path: /generates-story-and-page-image-through-local-dependencies
    verbose_output:
      - $.body.title
      - $.body.page_count
      - $.body.first_page_text
      - $.body.image_provider
      - $.body.image_bytes
    validations:
      - $.status_code.eq(200)
      - $.body.title.exists()
      - $.body.page_count.eq(10)
      - $.body.first_page_text.exists()
      - $.body.image_provider.eq("imagegen")
      - $.body.image_bytes.gte(100)
  - id: storybook-workload-typechecks
    kind: exec
    target:
      workload: storybook
    request:
      command:
        - bun
        - x
        - tsc
        - --noEmit
    validations:
      - $.exit_code.eq(0)
